    label: "사이트 문구"
    files:
      - name: "about"
        label: "센터 소개 문구"
        file: "content/about.json"
        editor:
          preview: false
        fields:
          - name: "desc"
            label: "센터 소개 본문"
            widget: "object"
            fields:
              - { name: "ko", label: "한국어", widget: "text" }
              - { name: "en", label: "English", widget: "text" }
              - { name: "ja", label: "日本語", widget: "text" }
