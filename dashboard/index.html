<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>지점 스케줄 대시보드 — BODYNOX</title>
  <link rel="icon" href="../assets/brand/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
</head>
<body class="dash">
  <!-- ============ 상단 바 ============ -->
  <header class="dash-header">
    <div class="container dash-header__inner">
      <div class="dash-brand">
        <img src="../assets/brand/logo_2.webp" alt="BODYNOX" width="140" height="28" />
        <span class="divider" aria-hidden="true"></span>
        <span class="title">지점 스케줄<small>Schedule Dashboard</small></span>
      </div>
      <div class="dash-header__actions">
        <div class="dash-updated" id="updated">불러오는 중…</div>
        <button type="button" class="btn btn--primary" id="refreshBtn">
          <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v5h-5" />
          </svg>
          <span>새로고침</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container" id="main">
    <!-- 상태 배너(샘플/오류 안내) -->
    <div class="dash-banner info" id="banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
      <span id="bannerText">현재는 <b>예시(샘플) 데이터</b>입니다. 세 지점 실시간 연동을 켜면 이 화면에 실제 스케줄이 표시됩니다.</span>
    </div>

    <!-- 지점 상태 요약 -->
    <section class="branch-status" id="branchStatus" aria-label="지점 연결 상태"></section>

    <!-- 날짜 이동 툴바 -->
    <div class="dash-toolbar">
      <div class="date-nav">
        <button type="button" class="date-nav__btn" id="prevDay" aria-label="이전 날짜">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div class="date-nav__label">
          <div class="d" id="dateLabel">—</div>
          <div class="w" id="weekLabel"></div>
        </div>
        <button type="button" class="date-nav__btn" id="nextDay" aria-label="다음 날짜">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
      <button type="button" class="btn--today" id="todayBtn">오늘</button>
    </div>

    <!-- 지점별 스케줄 보드 -->
    <section class="board" id="board" aria-live="polite"></section>

    <footer class="dash-foot">
      BODYNOX 내부 관리용 · 문구 편집은 <a href="/admin/">관리자(/admin)</a>에서 ·
      데이터 출처: crm.bodycodi.com · pilatesh1.studiomate.kr · care.butfit.io
    </footer>
  </main>

  <script src="../assets/js/dashboard.js"></script>
</body>
</html>
